<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020610"/>
    <stop offset="100%" stop-color="#040a18"/>
  </linearGradient>
  <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7C4DFF"/>
    <stop offset="100%" stop-color="#E040FB"/>
  </linearGradient>
  <radialGradient id="orb" cx="45%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#fff" stop-opacity=".9"/>
    <stop offset="20%" stop-color="#CE93D8"/>
    <stop offset="45%" stop-color="#7C4DFF"/>
    <stop offset="70%" stop-color="#311B92" stop-opacity=".6"/>
    <stop offset="100%" stop-color="#020610" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7C4DFF" stop-opacity=".28"/>
    <stop offset="50%" stop-color="#7C4DFF" stop-opacity=".05"/>
    <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
  </radialGradient>
  <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
  </filter>
</defs>

<!-- Background -->
<circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="url(#ring)" stroke-width="1.2" opacity=".8"/>

<!-- Glow -->
<circle cx="60" cy="60" r="40" fill="url(#glow)" filter="url(#bloom)"/>

<!-- Hex ring -->
<polygon points="90,60 75,86 45,86 30,60 45,34 75,34"
         fill="none" stroke="url(#ring)" stroke-width=".8"
         stroke-dasharray="16 12" opacity=".25">
  <animateTransform attributeName="transform" type="rotate"
    from="0 60 60" to="360 60 60" dur="20s" repeatCount="indefinite"/>
</polygon>

<!-- Inner hex -->
<polygon points="82,60 71,79 49,79 38,60 49,41 71,41"
         fill="none" stroke="#E040FB" stroke-width=".6"
         stroke-dasharray="10 16" opacity=".18">
  <animateTransform attributeName="transform" type="rotate"
    from="0 60 60" to="-360 60 60" dur="14s" repeatCount="indefinite"/>
</polygon>

<!-- Orb -->
<circle cx="60" cy="60" r="22" fill="url(#orb)"/>
<circle cx="60" cy="60" r="22" fill="none" stroke="#E040FB" stroke-width=".5" opacity=".25"/>
<ellipse cx="57" cy="50" rx="5" ry="3" fill="#fff" opacity=".14"/>

<!-- Search / magnifying-glass icon (research theme) -->
<g transform="translate(60,58)" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity=".85">
  <!-- Glass circle -->
  <circle cx="-3" cy="-3" r="7" fill="none" stroke-width="1.6"/>
  <!-- Handle -->
  <line x1="2.5" y1="2.5" x2="8" y2="8" stroke-width="2"/>
  <!-- Doc lines inside glass -->
  <line x1="-6" y1="-5" x2="0" y2="-5" stroke-width=".9" opacity=".5"/>
  <line x1="-6" y1="-2" x2="0" y2="-2" stroke-width=".9" opacity=".5"/>
  <line x1="-6" y1="1" x2="-2" y2="1" stroke-width=".9" opacity=".5"/>
</g>
</svg>
